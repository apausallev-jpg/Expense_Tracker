<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ── Navigation ── -->
<nav>
  <span class="brand">💰 Expense <span>Tracker</span></span>
  <button class="btn btn-outline btn-sm" id="add-btn" style="background:#fff2;border-color:#fff3;color:#fff">
    + Add Expense
  </button>
</nav>

<!-- ── Main content ── -->
<div class="container">

  <!-- Summary cards -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon" style="background:#eef2ff">💳</div>
      <div>
        <div class="value" id="stat-total">—</div>
        <div class="label">Total Expenses</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:#f0fdf4">📅</div>
      <div>
        <div class="value" id="stat-month">—</div>
        <div class="label">This Month</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:#fff7ed">📊</div>
      <div>
        <div class="value" id="stat-count">—</div>
        <div class="label">Total Records</div>
      </div>
    </div>
  </div>

  <!-- Main grid: table + sidebar -->
  <div class="main-grid">

    <!-- ── Expense table ── -->
    <div class="card">
      <div class="card-header">
        <h2>All Expenses</h2>
      </div>

      <!-- Filters -->
      <div class="filter-bar">
        <input type="search"        id="filter-search"   placeholder="🔍 Search…"       />
        <select                     id="filter-category">
          <option value="">All categories</option>
        </select>
        <input type="month"         id="filter-month"    />
        <button class="btn btn-outline btn-sm" id="clear-filters">Clear</button>
      </div>

      <!-- Table -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Category</th>
              <th>Amount</th>
              <th>Date</th>
              <th>Notes</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="expense-tbody">
            <tr><td colspan="6"><div class="empty-state"><div class="icon">⏳</div>Loading…</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ── Sidebar: category breakdown ── -->
    <div class="card">
      <div class="card-header">
        <h2>By Category</h2>
      </div>
      <div class="card-body">
        <ul class="cat-list" id="cat-list">
          <li class="cat-item" style="color:var(--muted)">Loading…</li>
        </ul>
      </div>
    </div>

  </div><!-- /main-grid -->
</div><!-- /container -->

<!-- ── Add / Edit Modal ── -->
<div class="modal-backdrop hidden" id="modal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">

    <div class="modal-header">
      <h3 id="modal-title">Add Expense</h3>
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    </div>

    <div class="modal-body">
      <form id="expense-form" onsubmit="return false">

        <div class="form-group">
          <label for="form-title">Title *</label>
          <input type="text" id="form-title" placeholder="e.g. Lunch at Jollibee" required maxlength="255" />
        </div>

        <div class="form-group">
          <label for="form-category">Category *</label>
          <select id="form-category" required>
            <option value="">Select category…</option>
          </select>
        </div>

        <div class="form-group">
          <label for="form-amount">Amount (₱) *</label>
          <input type="number" id="form-amount" placeholder="0.00" min="0.01" step="0.01" required />
        </div>

        <div class="form-group">
          <label for="form-date">Date *</label>
          <input type="date" id="form-date" required />
        </div>

        <div class="form-group">
          <label for="form-description">Notes (optional)</label>
          <textarea id="form-description" placeholder="Add any extra details…"></textarea>
        </div>

      </form>
    </div>

    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="save-btn">Save</button>
    </div>

  </div>
</div>

<!-- ── Toast notification ── -->
<div id="toast"></div>

<script src="js/app.js"></script>
</body>
</html>
